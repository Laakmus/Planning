name: E2E Tests

on:
  push:
    branches: [main, services]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.65.2

      - name: Start Supabase
        run: supabase start

      - name: Reset database (load migrations + seed)
        run: supabase db reset

      - name: Get Supabase env vars
        run: |
          ANON_KEY=$(supabase status -o env | grep ANON_KEY | cut -d= -f2)
          API_URL=$(supabase status -o env | grep API_URL | cut -d= -f2)
          echo "SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "CORS_ORIGIN=http://localhost:4321" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7
